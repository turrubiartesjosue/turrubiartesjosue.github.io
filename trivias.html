let preguntasActuales = [];
let indice = 0;
let puntos = 0;

function mezclarPreguntas(array) {
    return array.sort(() => Math.random() - 0.5);
}

function iniciarTrivia() {
    preguntasActuales = mezclarPreguntas([...bancoPreguntas]).slice(0, 10);

    indice = 0;
    puntos = 0;

    document.getElementById("menu-trivias").style.display = "none";
    document.getElementById("btn-siguiente").style.display = "inline-block";
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("btn-reiniciar").style.display = "none";

    mostrarPregunta();
}

function mostrarPregunta() {
    if (indice >= preguntasActuales.length) {
        document.getElementById("trivia-container").innerHTML = "";
        document.getElementById("resultado").innerHTML =
            "🏆 Puntaje final: " + puntos + " / " + preguntasActuales.length;
        document.getElementById("btn-siguiente").style.display = "none";
        document.getElementById("btn-reiniciar").style.display = "inline-block";
        return;
    }

    let p = preguntasActuales[indice];

    let html = `
        <h2>Pregunta ${indice + 1} de ${preguntasActuales.length}</h2>
        <p>${p.pregunta}</p>
    `;

    p.opciones.forEach((opcion, i) => {
        html += `
            <div>
                <input type="radio" name="respuesta" value="${i}" id="op${i}">
                <label for="op${i}">${opcion}</label>
            </div>
        `;
    });

    document.getElementById("trivia-container").innerHTML = html;
}

function siguientePregunta() {
    let seleccion = document.querySelector('input[name="respuesta"]:checked');

    if (seleccion) {
        if (parseInt(seleccion.value) === preguntasActuales[indice].correcta) {
            puntos++;
        }

        indice++;
        mostrarPregunta();
    } else {
        alert("Selecciona una respuesta");
    }
}

function reiniciarTrivia() {
    document.getElementById("menu-trivias").style.display = "block";
    document.getElementById("trivia-container").innerHTML = "";
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("btn-reiniciar").style.display = "none";
}

</script>
